services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app123
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: app_db
      DB_USER: app_user
      DB_PASSWORD: app123
      SECRET: "7f3c9a1d9b6e4f2c8a0d1e5f7a9b3c6d8e1f2a4b5c6d7e8f9a0b1c2d3e4f5"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/app/static/uploads

volumes:
  mysql_data:
  uploads_data:
