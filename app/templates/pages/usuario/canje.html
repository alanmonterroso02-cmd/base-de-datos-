{% from "layouts/dashboard/dashboard_usuario.html" import dashboard_usuario %}

{% call dashboard_usuario(title="Canjear Cupón") %}

<div class="container-fluid mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="bi bi-ticket me-2"></i>Canjear Cupón</h5>
        </div>
        <div class="card-body">
          <form id="canjeForm">
            <div class="mb-3">
              <label for="codigo" class="form-label small fw-medium">Código del cupón</label>
              <input type="text" class="form-control form-control-lg text-center text-uppercase"
                     id="codigo" name="codigo" placeholder="Ingresa el código"
                     style="font-family: monospace; font-size: 1.5rem; letter-spacing: 4px;"
                     required autocomplete="off" autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">
              <i class="bi bi-check2-circle me-2"></i>Canjear Cupón
            </button>
          </form>
          <div id="resultado" class="mt-3 d-none"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
document.getElementById('canjeForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = e.target.querySelector('button[type="submit"]');
  const resultado = document.getElementById('resultado');
  const codigo = document.getElementById('codigo').value.trim();

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Canjeando...';
  resultado.classList.add('d-none');

  try {
    const data = await EcoAPI.post('/cupones/usar?codigo=' + encodeURIComponent(codigo));
    let html = '<div class="alert alert-success mb-3"><strong><i class="bi bi-check-circle-fill me-2"></i>Éxito:</strong> ' + data.mensaje + '</div>';
    if (data.reciclador && data.premio) {
      html += '<div class="card border-success"><div class="card-body">';
      html += '<h6 class="card-subtitle mb-2 text-muted">Detalle del canje</h6>';
      if (data.premio.imagen) {
        html += '<img src="' + data.premio.imagen + '" class="img-fluid rounded mb-2" style="max-height:120px" alt="' + data.premio.nombre + '">';
      }
      html += '<p class="mb-1"><strong>Reciclador:</strong> ' + data.reciclador.nombre_completo + ' (NIT ' + data.reciclador.nit + ')</p>';
      html += '<p class="mb-0"><strong>Premio:</strong> ' + data.premio.nombre + ' — <strong>' + data.premio.costo_puntos + '</strong> pts</p>';
      html += '</div></div>';
    }
    resultado.innerHTML = html;
    resultado.classList.remove('d-none');
    document.getElementById('codigo').value = '';
    document.getElementById('codigo').focus();
    EcoToast.success(data.mensaje);
  } catch (error) {
    resultado.className = 'alert alert-danger mt-3';
    resultado.innerHTML = '<strong><i class="bi bi-exclamation-triangle-fill me-2"></i>Error:</strong> ' + error.message;
    resultado.classList.remove('d-none');
    EcoToast.error(error.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-check2-circle me-2"></i>Canjear Cupón';
  }
});
</script>

{% endcall %}
