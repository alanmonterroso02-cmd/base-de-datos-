{% macro render_table(headers, rows, badge_map={}) %}
<div class="table-responsive table-eco">
    <table class="table align-middle mb-0">
        <thead>
            <tr>
                {% for header in headers %}
                <th class="text-center">{{ header }}</th>
                {% endfor %}
                <th class="text-center">Acción</th>
            </tr>
        </thead>
        <tbody>
            {% for row in rows %}
            <tr>
                {% for value in row %}
                <td class="text-center">
                    {% if value in badge_map %}
                        <span class="badge-eco {{ badge_map[value] }}">
                            {{ value }}
                        </span>
                    {% else %}
                        {{ value }}
                    {% endif %}
                </td>
                {% endfor %}
                <td class="text-center">
                    <a href="#" class="btn btn-sm btn-outline-secondary rounded-pill px-3">
                        <i class="bi bi-eye"></i> Ver
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endmacro %}
