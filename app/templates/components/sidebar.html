{% macro render_sidebar(active_page="inicio") %}
<aside class="sidebar-container d-flex flex-column py-4">
    <div class="px-4 mb-5 d-flex align-items-center">
        <div class="metric-icon me-2 bg-eco-primary text-white">
            <i class="bi bi-leaf"></i>
        </div>
        <span class="fw-bold fs-5 text-eco-text">EcoRecicla</span>
    </div>

    <div class="flex-grow-1">
        <nav class="nav flex-column">
            <a href="/" class="nav-link-eco {{ 'active' if active_page == 'inicio' }}">
                <i class="bi bi-house-door"></i>
                <span>Inicio</span>
            </a>
            <a href="/historial" class="nav-link-eco {{ 'active' if active_page == 'historial' }}">
                <i class="bi bi-clock-history"></i>
                <span>Historial de Puntos</span>
            </a>
            <a href="/premios" class="nav-link-eco {{ 'active' if active_page == 'premios' }}">
                <i class="bi bi-trophy"></i>
                <span>Premios</span>
            </a>
            <a href="/perfil" class="nav-link-eco {{ 'active' if active_page == 'perfil' }}">
                <i class="bi bi-person-circle"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <div class="px-3 mt-auto">
        <a href="/logout" class="nav-link-eco text-danger">
            <i class="bi bi-box-arrow-right"></i>
            <span>Cerrar Sesión</span>
        </a>
    </div>
</aside>
{% endmacro %}
